<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="robots"
      content="noindex, nofollow, noarchive, nosnippet, noimageindex"
    />
    <meta
      name="googlebot"
      content="noindex, nofollow, noarchive, nosnippet, noimageindex"
    />
    <link rel="stylesheet" href="../styles/style.css" />
    <link
      rel="icon"
      type="image/x-icon"
      href="../assets/images/title_icon.ico"
    />
    <title>Projects - ahamSel</title>
    <script defer src="../scripts/themes.js"></script>
  </head>
  <body>
    <nav>
      <a href="./about">About</a>
      <a href="./projects">Projects</a>
      <a href="./contact">Contact</a>
      <a href="./contact#resume-request">Resume</a>
    </nav>

    <main class="page-shell">
      <section class="hero-card">
        <p class="eyebrow">Projects</p>
        <h1 id="projects">Selected work</h1>
        <p class="hero-lede">
          A curated set of products and technical work. Some newer projects do
          not have demo videos yet, so this page prioritizes what is useful,
          shipped, or representative over what happens to have a recording.
        </p>
      </section>

      <div class="project-items"></div>
      <section class="archive-projects"></section>

      <section class="projects-footer content-card">
        <span>More on GitHub</span
        ><a href="https://github.com/ahamSel" target="_blank" rel="noopener">
          <img
            src="../assets/images/github.png"
            alt="GitHub"
            width="30"
            height="30"
          />
        </a>
      </section>
    </main>

    <div class="theme-toggle">
      <button class="theme-toggle-btn" onclick="toggleThemeMenu()" aria-label="Toggle theme menu" aria-expanded="false">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/>
          <circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/>
          <circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/>
          <circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/>
          <path d="M12 22a1 1 0 0 1 0-20 10 9 0 0 1 10 9 5 5 0 0 1-5 5h-2.25a1.75 1.75 0 0 0-1.4 2.8l.3.4a1.75 1.75 0 0 1-1.4 2.8z"/>
        </svg>
      </button>
      <div class="theme-menu">
        <button data-theme="original" onclick="setTheme('original')" class="theme-btn">
          Dark
        </button>
        <button data-theme="nightOwl" onclick="setTheme('nightOwl')" class="theme-btn">
          Night Owl
        </button>
        <button data-theme="light" onclick="setTheme('light')" class="theme-btn">Light</button>
      </div>
    </div>

    <script src="../scripts/nav.js" defer></script>
    <script src="../scripts/projects.js" defer></script>
  </body>
</html>
